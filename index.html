<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>噂ちゃんねる — 아타미 사진집 캠페인</title>
<link rel="stylesheet" href="style.css?v=3">
</head>
<body>
  <div id="app">
    <main id="main"><!-- 렌더러가 채움 --></main>

    <aside id="sidebar" class="collapsed">
      <button id="bmHandle" aria-label="북마크 열기">
        <span class="bm-ico">📖</span>
        <span class="bm-label">북마크</span>
      </button>
      <div id="bmPanel">
        <div id="bmTypes">
          <span>🌐<br>HP</span>
          <span>📝<br>뉴스</span>
          <span>💬<br>게시판</span>
        </div>
        <ul id="bmList"><!-- 북마크 항목 --></ul>
      </div>
    </aside>

    <div id="toast"></div>

    <div id="lightbox" class="hidden">
      <img id="lightboxImg" src="" alt="">
    </div>
  </div>

  <script src="story.js?v=3"></script>
  <script src="engine.js?v=3"></script>
</body>
</html>
